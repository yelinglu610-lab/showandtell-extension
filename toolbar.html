<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:transparent; }
  body {
    display:flex; align-items:center; justify-content:center;
    background:rgba(12,12,12,.92);
    backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:30px;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    user-select:none;
    -webkit-app-region:drag;
  }
  .bar { display:flex; align-items:center; gap:2px; padding:6px 10px; -webkit-app-region:drag; }
  button, .cdot-wrap {
    -webkit-app-region:no-drag;
    border:none; background:transparent; cursor:pointer;
    display:flex; align-items:center; gap:7px;
    height:38px; padding:0 12px; border-radius:12px;
    font-size:13px; font-weight:600; color:#fff; letter-spacing:.2px;
    transition:background .15s, outline .15s;
    flex-shrink:0;
  }
  button:hover { background:rgba(255,255,255,.08); }
  button.on { background:rgba(255,214,0,.18); outline:1.5px solid rgba(255,214,0,.6); }
  button img { display:block; flex-shrink:0; pointer-events:none; }
  .sep { width:1px; height:20px; background:rgba(255,255,255,.08); margin:0 4px; flex-shrink:0; }
  #bRec { background:rgba(255,59,48,.15); }
  #bRec:hover { background:rgba(255,59,48,.28); }
  #bRec.recording { background:rgba(255,59,48,.9); }
  #timer { font-size:12px; font-weight:700; color:rgba(255,255,255,.75);
    font-variant-numeric:tabular-nums; letter-spacing:.5px; min-width:34px; text-align:center; -webkit-app-region:no-drag; }
  #timer.active { color:#FF3B30; }
  .close-btn { width:36px; height:36px; padding:0; justify-content:center; border-radius:10px; }

  /* 颜色面板 */
  #cpanel {
    position:fixed; bottom:56px; left:50%; transform:translateX(-50%);
    background:rgba(14,14,14,.97); border:1px solid rgba(255,255,255,.1);
    border-radius:18px; padding:12px; display:none; flex-wrap:wrap;
    gap:8px; width:192px; box-shadow:0 20px 60px rgba(0,0,0,.7);
    -webkit-app-region:no-drag;
  }
  .cswatch { width:28px; height:28px; border-radius:50%; cursor:pointer; border:2.5px solid transparent; transition:all .15s; }
  .cswatch:hover { transform:scale(1.2); }
  .cswatch.active { border-color:#fff; }
  .sw-row { width:100%; padding-top:10px; border-top:1px solid rgba(255,255,255,.07); }
  .sw-head { display:flex; justify-content:space-between; margin-bottom:6px; font-size:11px; }
  .sw-label { color:rgba(255,255,255,.4); }
  .sw-val { color:#fff; font-weight:600; }
  input[type=range] { width:100%; accent-color:#FFD600; }

  /* 摄像泡 */
  #bubble {
    position:fixed; right:20px; top:20px;
    width:200px; height:150px; border-radius:20px; overflow:hidden;
    box-shadow:0 0 0 3px #fff, 0 8px 32px rgba(0,0,0,.4);
    background:#000; display:none; -webkit-app-region:no-drag;
    cursor:grab;
  }
  #bubble video { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); display:block; pointer-events:none; }
  #shapeBar { position:absolute; top:6px; right:6px; background:rgba(0,0,0,.55); border-radius:8px; padding:3px 6px; display:flex; gap:4px; z-index:10; pointer-events:all; }
  #shapeBar span { font-size:11px; cursor:pointer; transition:color .15s; }
  #resizeHandle {
    position:absolute; right:4px; bottom:4px; width:16px; height:16px;
    background:#FFD600; border-radius:4px; cursor:se-resize; z-index:10;
    box-shadow:0 1px 4px rgba(0,0,0,.4); pointer-events:all;
  }

  /* 导出面板 */
  #expanel {
    display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(12,12,12,.97); flex-direction:column;
    align-items:center; justify-content:center; gap:10px; padding:20px;
    -webkit-app-region:no-drag;
  }
  #expanel h2 { color:#fff; font-size:18px; }
  #expanel .sub { color:rgba(255,255,255,.35); font-size:13px; margin-top:2px; }
  #expanel button { width:100%; height:46px; border-radius:12px; border:none; cursor:pointer; font-size:14px; font-weight:700; }
  #edl { background:#FFD600; color:#111; }
  #ecls { background:transparent; color:rgba(255,255,255,.3); font-size:13px; }
</style>
</head>
<body>
<div class="bar" id="bar">
  <button id="bCam"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/1f4f7.svg" width="20" height="20">摄像头</button>
  <div class="sep"></div>
  <button id="bMouse" class="on"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/1f5b1.svg" width="18" height="18">鼠标</button>
  <button id="bLaser"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/1f526.svg" width="20" height="20">激光笔</button>
  <button class="cdot-wrap" id="bColor">
    <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/1f3a8.svg" width="20" height="20">颜色
    <div id="cdot" style="width:10px;height:10px;border-radius:50%;background:#FF3B30;border:1.5px solid rgba(255,255,255,.5);flex-shrink:0;"></div>
  </button>
  <div class="sep"></div>
  <button id="bRec"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/1f534.svg" width="18" height="18">录制</button>
  <div id="timer">00:00</div>
  <div class="sep"></div>
  <button class="close-btn" id="bClose">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.45)" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
  </button>
</div>

<div id="cpanel"></div>
<div id="bubble"><video id="vid" autoplay muted playsinline></video><div id="shapeBar"></div><div id="resizeHandle"></div></div>
<div id="expanel"><h2>录制完成</h2><div class="sub" id="esub"></div><button id="edl">下载录制文件</button><button id="ecls">关闭</button></div>

<script>
const COLORS=["#FF3B30","#FF9500","#FFD600","#34C759","#007AFF","#5856D6","#fff","#111"]
const SHAPES=[{id:"circle",label:"⬤",r:"50%"},{id:"rounded",label:"▢",r:"20px"},{id:"square",label:"■",r:"6px"}]
let laserColor="#FF3B30", laserW=5
let camOn=false, camStream=null, camShape="rounded"
let recOn=false, recSecs=0, recTimer=null, recorder=null, chunks=[], lastBlob=null
let cpShown=false

// ── 颜色面板 ──
const cpanel=document.getElementById("cpanel")
COLORS.forEach(c=>{
  const s=document.createElement("div"); s.className="cswatch"+(c===laserColor?" active":"")
  s.style.background=c; s.onclick=()=>{
    laserColor=c; document.getElementById("cdot").style.background=c
    cpanel.querySelectorAll(".cswatch").forEach(d=>d.classList.remove("active")); s.classList.add("active")
    chrome.tabs.query({active:true,currentWindow:false},tabs=>{
      if(tabs[0]) chrome.tabs.sendMessage(tabs[0].id,{type:"setColor",color:c,width:laserW})
    }); hideCp()
  }; cpanel.append(s)
})
const sw=document.createElement("div"); sw.className="sw-row"
const sh=document.createElement("div"); sh.className="sw-head"
const sl=document.createElement("span"); sl.className="sw-label"; sl.textContent="粗细"
const sv=document.createElement("span"); sv.className="sw-val"; sv.textContent=laserW+"px"
sh.append(sl,sv)
const si=document.createElement("input"); si.type="range";si.min=2;si.max=14;si.value=laserW
si.oninput=()=>{ laserW=+si.value; sv.textContent=laserW+"px";
  chrome.tabs.query({active:true,currentWindow:false},tabs=>{ if(tabs[0]) chrome.tabs.sendMessage(tabs[0].id,{type:"setColor",color:laserColor,width:laserW}) })
}
sw.append(sh,si); cpanel.append(sw)
function hideCp(){ cpShown=false; cpanel.style.display="none" }

// ── 形状按钮 ──
const shapeBar=document.getElementById("shapeBar")
SHAPES.forEach(s=>{
  const b=document.createElement("span"); b.textContent=s.label
  b.style.color=s.id===camShape?"#FFD600":"rgba(255,255,255,.5)"
  b.onclick=()=>{
    camShape=s.id; shapeBar.querySelectorAll("span").forEach((sp,i)=>sp.style.color=SHAPES[i].id===s.id?"#FFD600":"rgba(255,255,255,.5)")
    applyShape()
  }; shapeBar.append(b)
})
function applyShape(){
  const bub=document.getElementById("bubble")
  const r=SHAPES.find(s=>s.id===camShape)?.r||"20px"
  bub.style.borderRadius=r
}

// ── 摄像头拖拽+缩放 ──
const bub = document.getElementById("bubble")
const rh = document.getElementById("resizeHandle")
let camPos = { x: window.innerWidth - 228, y: 20 }
let camSize = { w: 200, h: 150 }
let isDragging = false, isResizing = false, dragOffset = { x: 0, y: 0 }, resizeStart = {}

function updateBubble() {
  bub.style.left = camPos.x + "px"; bub.style.top = camPos.y + "px"
  bub.style.right = "auto"; bub.style.bottom = "auto"
  bub.style.width = camSize.w + "px"; bub.style.height = camSize.h + "px"
  applyShape()
}

bub.addEventListener("mousedown", e => {
  if (e.target === rh || document.getElementById("shapeBar").contains(e.target)) return
  isDragging = true
  dragOffset = { x: e.clientX - camPos.x, y: e.clientY - camPos.y }
  bub.style.cursor = "grabbing"
  e.preventDefault()
})
rh.addEventListener("mousedown", e => {
  isResizing = true
  resizeStart = { mx: e.clientX, my: e.clientY, w: camSize.w, h: camSize.h }
  e.stopPropagation(); e.preventDefault()
})
window.addEventListener("mousemove", e => {
  if (isDragging) {
    camPos = { x: e.clientX - dragOffset.x, y: e.clientY - dragOffset.y }
    updateBubble()
  }
  if (isResizing) {
    const dx = e.clientX - resizeStart.mx
    const dy = e.clientY - resizeStart.my
    camSize = {
      w: Math.max(80, Math.min(700, resizeStart.w + dx)),
      h: Math.max(60, Math.min(600, resizeStart.h + dy))
    }
    updateBubble()
  }
})
window.addEventListener("mouseup", () => {
  isDragging = false; isResizing = false; bub.style.cursor = "grab"
})
bub.addEventListener("wheel", e => {
  e.preventDefault()
  const f = e.deltaY < 0 ? 1.1 : 0.9
  camSize = {
    w: Math.max(80, Math.min(700, Math.round(camSize.w * f))),
    h: Math.max(60, Math.min(600, Math.round(camSize.h * f)))
  }
  updateBubble()
}, { passive: false })

document.getElementById("bCam").onclick = async () => {
  if (camOn) { stopCam() } else { await startCam() }
}
async function startCam() {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: false })
    document.getElementById("vid").srcObject = camStream
    camPos = { x: window.innerWidth - 228, y: 20 }
    camSize = { w: 200, h: 150 }
    updateBubble()
    bub.style.display = "block"
    camOn = true; setOn(document.getElementById("bCam"), true)
  } catch(e) { alert("摄像头失败：" + e.message) }
}
function stopCam() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null }
  bub.style.display = "none"
  camOn = false; setOn(document.getElementById("bCam"), false)
}

// ── 激光/鼠标 ──
document.getElementById("bMouse").onclick=()=>{
  setOn(document.getElementById("bMouse"),true); setOn(document.getElementById("bLaser"),false)
  sendToTab({type:"setLaser",on:false})
}
document.getElementById("bLaser").onclick=()=>{
  setOn(document.getElementById("bLaser"),true); setOn(document.getElementById("bMouse"),false)
  sendToTab({type:"setLaser",on:true,color:laserColor,width:laserW})
}
document.getElementById("bColor").onclick=e=>{
  e.stopPropagation(); cpShown=!cpShown; cpanel.style.display=cpShown?"flex":"none"
}
document.addEventListener("click",e=>{ if(!cpanel.contains(e.target)&&e.target!==document.getElementById("bColor")) hideCp() })

// ── 录制 ──
document.getElementById("bRec").onclick=()=> recOn?stopRec():startRec()
async function startRec(){
  try{
    const ss=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:30},audio:true})
    let ms=null; try{ ms=await navigator.mediaDevices.getUserMedia({audio:true,video:false}) }catch{}
    const tracks=[...ss.getTracks()]; if(ms)tracks.push(...ms.getAudioTracks())
    chunks=[]; recorder=new MediaRecorder(new MediaStream(tracks),{mimeType:"video/webm;codecs=vp9"})
    recorder.ondataavailable=e=>{ if(e.data.size>0)chunks.push(e.data) }
    recorder.onstop=()=>{
      lastBlob=new Blob(chunks,{type:"video/webm"})
      ss.getTracks().forEach(t=>t.stop()); if(ms)ms.getTracks().forEach(t=>t.stop())
      showExport()
    }
    recorder.start(); recOn=true; recSecs=0
    const bRec=document.getElementById("bRec")
    bRec.innerHTML=`<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/23f9.svg" width="18" height="18">停止`
    bRec.classList.add("recording")
    const timer=document.getElementById("timer"); timer.classList.add("active")
    recTimer=setInterval(()=>{ recSecs++; timer.textContent=fmt(recSecs) },1000)
    ss.getVideoTracks()[0].onended=stopRec
  }catch(e){ console.error(e) }
}
function stopRec(){
  if(!recOn)return; recOn=false; clearInterval(recTimer)
  if(recorder?.state!=="inactive")recorder.stop()
  const bRec=document.getElementById("bRec")
  bRec.innerHTML=`<img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/1f534.svg" width="18" height="18">录制`
  bRec.classList.remove("recording")
  const timer=document.getElementById("timer"); timer.classList.remove("active"); timer.textContent="00:00"
}
function showExport(){
  const ep=document.getElementById("expanel")
  document.getElementById("esub").textContent=`${fmt(recSecs)} · ${(lastBlob.size/1024/1024).toFixed(1)} MB`
  ep.style.display="flex"
  document.getElementById("edl").onclick=()=>{
    const u=URL.createObjectURL(lastBlob),a=document.createElement("a")
    a.href=u; a.download=`showandtell-${Date.now()}.webm`; document.body.append(a); a.click(); a.remove()
    setTimeout(()=>URL.revokeObjectURL(u),3e3); ep.style.display="none"
  }
  document.getElementById("ecls").onclick=()=>ep.style.display="none"
}

// ── 关闭 ──
document.getElementById("bClose").onclick=()=>window.close()

// ── 工具函数 ──
function fmt(s){ return`${Math.floor(s/60).toString().padStart(2,"0")}:${(s%60).toString().padStart(2,"0")}` }
function setOn(btn,on){ btn.classList.toggle("on",on) }
function sendToTab(msg){
  chrome.tabs.query({},tabs=>{
    tabs.forEach(t=>{ try{ chrome.tabs.sendMessage(t.id,msg) }catch{} })
  })
}

// 键盘快捷键
document.addEventListener("keydown",e=>{
  if(e.key==="l"||e.key==="L") document.getElementById("bLaser").click()
  if(e.key==="m"||e.key==="M") document.getElementById("bMouse").click()
  if(e.key==="c"||e.key==="C") document.getElementById("bCam").click()
  if(e.key==="r"||e.key==="R") document.getElementById("bRec").click()
  if(e.key==="Escape") window.close()
})
</script>
</body>
</html>
