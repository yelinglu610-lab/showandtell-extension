<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:transparent; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    user-select:none; background:transparent;
  }

  /* ── 外壳（可拖动） ── */
  #shell {
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    background:rgba(12,12,12,.93);
    backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:30px;
    box-shadow:0 2px 0 1px rgba(0,0,0,.5),0 16px 48px rgba(0,0,0,.6);
    cursor:grab; display:flex; flex-direction:column; align-items:center;
  }
  #shell.grabbing { cursor:grabbing; }

  /* ── 工具栏 ── */
  #bar {
    display:flex; align-items:center; gap:2px; padding:6px 10px;
  }

  /* ── 收起条（展示时） ── */
  #collapseBar {
    display:none; align-items:center; justify-content:center;
    padding:4px 20px; cursor:pointer; gap:6px;
  }
  #collapseBar span { font-size:11px; color:rgba(255,255,255,.3); }

  /* ── 按钮通用 ── */
  button {
    pointer-events:all;
    border:none; background:transparent; cursor:pointer;
    display:flex; align-items:center; gap:7px;
    height:38px; padding:0 12px; border-radius:12px;
    font-size:13px; font-weight:600; color:#fff; letter-spacing:.2px;
    transition:background .15s, outline .15s; flex-shrink:0;
  }
  button:hover { background:rgba(255,255,255,.09); }
  button.on { background:rgba(255,214,0,.18); outline:1.5px solid rgba(255,214,0,.55); }
  button img { display:block; flex-shrink:0; pointer-events:none; }
  .sep { width:1px; height:20px; background:rgba(255,255,255,.08); margin:0 3px; flex-shrink:0; }

  #bRec { background:rgba(255,59,48,.15); }
  #bRec:hover { background:rgba(255,59,48,.28); }
  #bRec.rec { background:rgba(255,59,48,.9); }

  #timer { font-size:12px; font-weight:700; color:rgba(255,255,255,.7);
    font-variant-numeric:tabular-nums; letter-spacing:.5px; min-width:32px; text-align:center; }
  #timer.active { color:#FF3B30; }

  #bMic { width:36px; height:36px; padding:0; justify-content:center; border-radius:10px; }
  #bClose { width:36px; height:36px; padding:0; justify-content:center; border-radius:10px; }
  #bToggle { width:32px; height:28px; padding:0; justify-content:center; border-radius:8px; }

  /* ── 颜色面板 ── */
  #cpanel {
    position:fixed; top:68px; left:50%; transform:translateX(-50%);
    background:rgba(14,14,14,.97); border:1px solid rgba(255,255,255,.1);
    border-radius:18px; padding:12px; display:none; flex-wrap:wrap;
    gap:8px; width:196px; box-shadow:0 20px 60px rgba(0,0,0,.7); z-index:999;
  }
  .cswatch { width:28px; height:28px; border-radius:50%; cursor:pointer;
    border:2.5px solid transparent; transition:all .15s; }
  .cswatch:hover { transform:scale(1.2); }
  .cswatch.sel { border-color:#fff; }
  .sw-row { width:100%; padding-top:10px; border-top:1px solid rgba(255,255,255,.07); }
  .sw-head { display:flex; justify-content:space-between; margin-bottom:6px; font-size:11px; }
  .sw-lbl { color:rgba(255,255,255,.4); }
  .sw-val { color:#fff; font-weight:600; }
  input[type=range] { width:100%; accent-color:#FFD600; }

  /* ── 摄像头形状菜单 ── */
  #shapePop {
    position:fixed; top:68px; left:50%; transform:translateX(-50%);
    background:rgba(14,14,14,.97); border:1px solid rgba(255,255,255,.1);
    border-radius:14px; padding:8px; display:none; flex-direction:column; gap:4px;
    box-shadow:0 16px 48px rgba(0,0,0,.7); z-index:999; min-width:120px;
  }
  #shapePop button { height:34px; padding:0 12px; justify-content:flex-start;
    font-size:13px; border-radius:8px; }
  #shapePop button.sel { background:rgba(255,214,0,.18); color:#FFD600; }

  /* ── 摄像泡 ── */
  #bubble {
    position:fixed; right:24px; top:80px;
    width:200px; height:150px; border-radius:20px; overflow:hidden;
    box-shadow:0 0 0 3px #fff, 0 8px 32px rgba(0,0,0,.4);
    background:#000; display:none; cursor:grab;
  }
  #bubble.grabbing { cursor:grabbing; }
  #bubble video { width:100%;height:100%;object-fit:cover;transform:scaleX(-1);display:block;pointer-events:none; }
  /* resize handle — 透明角落热区，无黄点 */
  #rh { position:absolute;right:0;bottom:0;width:24px;height:24px;cursor:se-resize;z-index:10; }

  /* ── 导出面板 ── */
  #expanel {
    display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(12,12,12,.97); flex-direction:column;
    align-items:center; justify-content:center; gap:10px; padding:24px;
  }
  #expanel h2 { color:#fff; font-size:18px; }
  #expanel .sub { color:rgba(255,255,255,.35); font-size:13px; }
  #expanel button { width:100%; height:46px; border-radius:12px; border:none; cursor:pointer; font-size:14px; font-weight:700; }
  #edl { background:#FFD600; color:#111; }
  #ecls { background:transparent; color:rgba(255,255,255,.28); font-size:13px; }
</style>
</head>
<body>

<div id="shell">
  <div id="bar">
    <button id="bCam"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/1f4f7.svg" width="20" height="20">摄像头</button>
    <button id="bShape" title="摄像框形状">···</button>
    <button id="bMic" title="麦克风">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="1.8" stroke-linecap="round">
        <rect x="9" y="2" width="6" height="11" rx="3" fill="rgba(255,255,255,.25)" stroke="rgba(255,255,255,.4)"/>
        <path d="M5 11a7 7 0 0014 0"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="9" y1="22" x2="15" y2="22"/>
      </svg>
    </button>
    <div class="sep"></div>
    <button id="bMouse" class="on"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/1f5b1.svg" width="18" height="18">鼠标</button>
    <button id="bLaser"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/1f526.svg" width="20" height="20">激光笔</button>
    <button id="bColor"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/1f3a8.svg" width="20" height="20">颜色</button>
    <div class="sep"></div>
    <button id="bRec"><img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/svg/1f534.svg" width="18" height="18">录制</button>
    <div id="timer">00:00</div>
    <div class="sep"></div>
    <button id="bToggle" title="收起">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="2.5" stroke-linecap="round"><path d="M18 15l-6-6-6 6"/></svg>
    </button>
    <button id="bClose">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div id="collapseBar">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="2.5" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
    <span>ShowAndTell</span>
  </div>
</div>

<div id="cpanel"></div>
<div id="shapePop"></div>
<div id="bubble"><video id="vid" autoplay muted playsinline></video><div id="rh"></div></div>
<div id="expanel"><h2>录制完成</h2><div class="sub" id="esub"></div><button id="edl">下载录制文件</button><button id="ecls">关闭</button></div>

<script src="src/toolbar.js"></script>
</body>
</html>
